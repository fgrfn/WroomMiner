; ============================================================
;  WroomMiner - PlatformIO Configuration
;  Target: ESP32-WROOM-32D with 4 MB flash
; ============================================================

[platformio]
default_envs = esp32dev

; ------------------------------------------------------------
;  Shared build flags and libraries
; ------------------------------------------------------------
[env]
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

lib_deps =
    ; --- WiFi management with captive portal ---
    https://github.com/tzapu/WiFiManager.git#v2.0.17

    ; --- HTTP server (async, faster than ESP32WebServer) ---
    esp32async/AsyncTCP@^3.2.10
    esp32async/ESPAsyncWebServer@^3.6.0

    ; --- JSON parsing for Stratum + API ---
    bblanchon/ArduinoJson@^7.2.0

build_flags =
    ; --- Configuration ---
    -D WROOMMINER_VERSION="\"0.1.0\""
    -D WROOMMINER_NAME="\"WroomMiner\""
    -D CONFIG_ARDUINOJSON_USE_LONG_LONG=1

    ; --- Required by ESPAsyncWebServer ---
    -D CONFIG_ASYNC_TCP_USE_WDT=0

    ; --- Mining tuning ---
    -D MINING_TASK_STACK=16384
    -D MINING_TASK_PRIORITY=1

    ; --- Compiler optimization for speed ---
    -O3
    -funroll-loops

; ------------------------------------------------------------
;  Main environment: ESP32-WROOM-32D
; ------------------------------------------------------------
[env:esp32dev]
platform = espressif32@^6.9.0
board = esp32dev
board_build.partitions = partitions.csv
board_build.flash_mode = dio
board_upload.flash_size = 4MB

build_flags =
    ${env.build_flags}
    -D BOARD_ESP32_WROOM_32D=1

; ------------------------------------------------------------
;  Optional: debug build with verbose logging
; ------------------------------------------------------------
[env:esp32dev-debug]
extends = env:esp32dev
build_type = debug
build_flags =
    ${env:esp32dev.build_flags}
    -D CORE_DEBUG_LEVEL=4
    -D WROOMMINER_DEBUG=1

; ------------------------------------------------------------
;  Optional: OTA upload (once a miner is running)
;  Usage: pio run -e esp32dev-ota -t upload
; ------------------------------------------------------------
[env:esp32dev-ota]
extends = env:esp32dev
upload_protocol = espota
; Adjust the miner IP:
upload_port = 192.168.1.100
upload_flags =
    --port=3232
